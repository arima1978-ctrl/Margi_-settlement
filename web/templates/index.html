<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>月次清算書 生成ツール</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --border: #d0d7de;
      --muted: #57606a;
      --ok: #1a7f37;
      --ng: #cf222e;
      --bg: #f6f8fa;
      --accent: #0969da;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
                   "Noto Sans JP", sans-serif;
      margin: 0; padding: 16px 24px;
      background: var(--bg); color: #1f2328;
    }
    h1 { margin: 0 0 16px; font-size: 20px; }
    h2 { font-size: 16px; margin: 24px 0 8px; }
    main { max-width: 960px; margin: 0 auto; }
    .card {
      background: #fff; border: 1px solid var(--border); border-radius: 8px;
      padding: 16px; margin-bottom: 16px;
    }
    label { display: inline-block; margin-right: 12px; font-size: 14px; }
    input[type=month] {
      padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px;
      font-size: 14px;
    }
    fieldset { border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; margin: 8px 0; }
    legend { font-size: 13px; color: var(--muted); padding: 0 6px; }
    button {
      background: var(--accent); color: #fff; border: 0; padding: 6px 16px;
      border-radius: 6px; font-size: 14px; cursor: pointer;
    }
    button:disabled { background: var(--muted); cursor: not-allowed; }
    pre#log {
      background: #0d1117; color: #c9d1d9; padding: 12px; border-radius: 6px;
      height: 360px; overflow: auto; font-size: 12px; line-height: 1.5;
      white-space: pre-wrap; word-break: break-all;
    }
    .status { font-size: 13px; color: var(--muted); margin-top: 8px; }
    .status.running { color: var(--accent); }
    .status.done { color: var(--ok); }
    .status.failed { color: var(--ng); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
    th { background: var(--bg); font-weight: 600; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .small { font-size: 12px; color: var(--muted); }
    .right { float: right; }
  </style>
</head>
<body>
<main>
  <h1>月次清算書 生成ツール <span class="small right">user: {{ user }}</span></h1>

  <div class="card">
    <form id="run-form">
      <label>対象月
        <input type="month" name="month" value="{{ default_month }}" required>
      </label>
      <fieldset>
        <legend>対象サービス</legend>
        {% for svc in services %}
          <label><input type="checkbox" name="services" value="{{ svc }}" checked> {{ svc }}</label>
        {% endfor %}
      </fieldset>
      <label><input type="checkbox" name="notify" checked> Telegram 通知する</label>
      <br>
      <button type="submit" id="run-btn">生成実行</button>
      <span class="small">※ 実行中はブラウザを閉じても処理は継続します</span>
    </form>
    <div id="status" class="status"></div>
  </div>

  <div class="card">
    <h2>実行ログ</h2>
    <pre id="log">ここに実行ログがストリームされます...</pre>
  </div>

  <div class="card">
    <h2>最近生成されたファイル</h2>
    <table>
      <thead>
        <tr><th>サービス</th><th>ファイル名</th><th>更新日時</th><th>サイズ</th><th></th></tr>
      </thead>
      <tbody id="file-list">
        {% for f in files %}
          <tr>
            <td>{{ f.service }}</td>
            <td>{{ f.name }}</td>
            <td class="small">{{ f.mtime }}</td>
            <td class="small">{{ (f.size // 1024) }} KB</td>
            <td><a href="/download?path={{ f.path | urlencode }}">ダウンロード</a></td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
    <div class="small">BASE_DIR: {{ base_dir }}</div>
  </div>
</main>

<script>
  const form = document.getElementById('run-form');
  const logEl = document.getElementById('log');
  const statusEl = document.getElementById('status');
  const runBtn = document.getElementById('run-btn');

  let pollTimer = null;
  let currentJobId = null;
  let offset = 0;

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'status ' + (cls || '');
  }

  async function poll() {
    if (!currentJobId) return;
    try {
      const r = await fetch(`/status/${currentJobId}?offset=${offset}`);
      if (!r.ok) throw new Error(`status ${r.status}`);
      const data = await r.json();
      if (data.new_lines.length > 0) {
        logEl.textContent += data.new_lines.join('');
        logEl.scrollTop = logEl.scrollHeight;
        offset = data.next_offset;
      }
      const st = data.job.status;
      if (st === 'running') {
        setStatus(`実行中 (${data.job.log_count}行)`, 'running');
      } else if (st === 'done') {
        setStatus(`完了 (returncode=${data.job.returncode})`, 'done');
        clearInterval(pollTimer);
        pollTimer = null;
        runBtn.disabled = false;
        refreshFileList();
      } else if (st === 'failed') {
        setStatus(`失敗 (returncode=${data.job.returncode})`, 'failed');
        clearInterval(pollTimer);
        pollTimer = null;
        runBtn.disabled = false;
        refreshFileList();
      }
    } catch (e) {
      console.error(e);
    }
  }

  async function refreshFileList() {
    try {
      const r = await fetch('/files');
      if (!r.ok) return;
      const data = await r.json();
      const tbody = document.getElementById('file-list');
      tbody.innerHTML = data.files.map(f => `
        <tr>
          <td>${f.service}</td>
          <td>${escapeHtml(f.name)}</td>
          <td class="small">${f.mtime}</td>
          <td class="small">${Math.floor(f.size/1024)} KB</td>
          <td><a href="/download?path=${encodeURIComponent(f.path)}">ダウンロード</a></td>
        </tr>
      `).join('');
    } catch (e) { console.error(e); }
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    runBtn.disabled = true;
    logEl.textContent = '';
    offset = 0;
    setStatus('送信中...', 'running');

    const fd = new FormData(form);
    const r = await fetch('/run', { method: 'POST', body: fd });
    if (!r.ok) {
      const err = await r.text();
      setStatus(`起動失敗: ${err}`, 'failed');
      runBtn.disabled = false;
      return;
    }
    const data = await r.json();
    currentJobId = data.job_id;
    setStatus('実行中...', 'running');
    poll();
    pollTimer = setInterval(poll, 2000);
  });
</script>
</body>
</html>
