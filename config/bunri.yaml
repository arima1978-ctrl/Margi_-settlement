# 文理ヴィクトリー清算書の設定
#
# 注意: source 側は「文理ビクトリー」(ヴ無し) が多く、
#       清算書側は混在する。各 mapping の source/dest で吸収する。
#
# 各カテゴリーシートの清算書には r3 に「例」行(B='例', C=999999)があり、
# データ行は r4 から始まる。source 側のデータ開始行は sheet によって r3/r4 と異なるので、
# source_data_start_row で吸収する。
service: bunri

report_sheet: 報告書
month_cell: D1
manual_cells: []

sheet_replacements:
  # 保護者情報
  - source_sheet: 保護者情報DL貼付⑩AKへ
    dest_sheet: 保護者情報DL貼付⑩AKへ
    header_rows: 1
    helper_columns: {}

  # 基本料金 (src/dst 同名、ヴ無し)
  # 報告書 L列 = VLOOKUP(..., !$C:$R, 6, 0) → col H 料金の最初のマッチを返す (集約不要だが O/P を慣例で集約)
  # helper: A=COUNTIF, L/M=C/H; aggregate O/P from C/H
  - source_sheet: 文理ビクトリー_基本料金
    dest_sheet: 文理ビクトリー_基本料金
    header_rows: 3
    data_start_row: 4
    source_data_start_row: 4  # src r3 はラベル行なのでスキップ
    helper_columns:
      A: "=COUNTIF($C:$C,C{row})"
      L: "=C{row}"
      M: "=H{row}"
    aggregates:
      - dst_col_id: O
        dst_col_sum: P
        src_col_id: C
        src_col_sum: H

  # 初期費用 (src=文理ビクトリー初期費用 → dst=文理ヴィクトリー初期費用, ヴ追加)
  # 報告書 K列 = VLOOKUP(..., !$U:$V, 2, 0) → aggregate U/V
  # helper: A=COUNTIF, R/S=C/H (L/M は使わない); aggregate U/V from C/H
  - source_sheet: 文理ビクトリー初期費用
    dest_sheet: 文理ヴィクトリー初期費用
    header_rows: 3
    data_start_row: 4
    source_data_start_row: 4  # src r3 はラベル行なのでスキップ
    helper_columns:
      A: "=COUNTIF($C:$C,C{row})"
      R: "=C{row}"
      S: "=H{row}"
    aggregates:
      - dst_col_id: U
        dst_col_sum: V
        src_col_id: C
        src_col_sum: H

  # 生徒ID料 (src=④文理ビクトリー利用料 → dst=文理_生徒)
  # src header 2行/data r3から、dst header 2行+例行r3/data r4から
  # 報告書 M列 = VLOOKUP(..., 文理_生徒!$U:$V, 2, 0)
  # helper: R/S=C/H; aggregate U/V; src の T/U/V/W には COUNTIF ゴミ → clear T/W (U/V は aggregate が上書き)
  - source_sheet: ④文理ビクトリー利用料
    dest_sheet: 文理_生徒
    header_rows: 3
    data_start_row: 4
    source_data_start_row: 3
    helper_columns:
      R: "=C{row}"
      S: "=H{row}"
    aggregates:
      - dst_col_id: U
        dst_col_sum: V
        src_col_id: C
        src_col_sum: H
    clear_columns: [T, W]

  # オンライン個別チケット (src=④文理ビクトリーチケット → dst=文理V_オンライン個別)
  - source_sheet: ④文理ビクトリーチケット
    dest_sheet: 文理V_オンライン個別
    header_rows: 3
    data_start_row: 4
    source_data_start_row: 3
    helper_columns:
      R: "=C{row}"
      S: "=H{row}"
    aggregates:
      - dst_col_id: U
        dst_col_sum: V
        src_col_id: C
        src_col_sum: H
    clear_columns: [T, W]

  # 有料講座 (src=④文理ビクトリー有料講座 → dst=文理ヴィクトリー有料講座, ヴ追加)
  # source の r3 は COUNTIF ゴミのみで C/H 共に空なので、r4 からコピー開始
  - source_sheet: ④文理ビクトリー有料講座
    dest_sheet: 文理ヴィクトリー有料講座
    header_rows: 3
    data_start_row: 4
    source_data_start_row: 4
    helper_columns:
      R: "=C{row}"
      S: "=H{row}"
    aggregates:
      - dst_col_id: U
        dst_col_sum: V
        src_col_id: C
        src_col_sum: H
    clear_columns: [T, W]

  # おまかせコース (src=④文理おまかせコース → dst=文理おまかせコース, ④除去)
  - source_sheet: ④文理おまかせコース
    dest_sheet: 文理おまかせコース
    header_rows: 3
    data_start_row: 4
    source_data_start_row: 3
    helper_columns:
      R: "=C{row}"
      S: "=H{row}"
    aggregates:
      - dst_col_id: U
        dst_col_sum: V
        src_col_id: C
        src_col_sum: H
    clear_columns: [T, W]

new_shop_detection:
  enabled: true
  auto_append_to_report: false

  source_category_sheets:
    - ④文理ビクトリー利用料
    - ④文理ビクトリー有料講座
    - ④文理おまかせコース
    - ④文理ビクトリーチケット
    - 文理ビクトリー初期費用
    - 文理ビクトリー_基本料金

  report_family_id_column: B
  report_data_start_row: 6
  report_al_column: null

# 文理ヴィクトリーお問い合わせリスト を Google Sheet の CSV から全行置換。
# 清算書の r1 はヘッダー、データは r2 から。CSV も同じ構造で、0-indexed で
# 列 0=oka / 3=塾ID / ... と並ぶ。2列目 (C列相当) はスペーサーで空。
sales_master_sync:
  enabled: true
  sheet: 文理ヴィクトリーお問い合わせリスト

  # Google Sheet のファイル ID を export URL で CSV として取得する。
  # 共有リンクを「閲覧者」以上で公開しておく必要がある。
  csv_url: "https://docs.google.com/spreadsheets/d/1_2-r0yrT5iF3_4xc8bu1xbsLNGNY446AqUtvssf_bTU/export?format=csv&gid=0"

  csv_id_column: 3         # 塾ID は CSV の 4列目 (0-indexed = 3)
  csv_data_start_row: 1    # CSV ヘッダーは行 0、データは行 1 から
  excel_data_start_row: 2  # Excel ヘッダーは行 1、データは行 2 から
  excel_max_col_letter: AF

  # CSV 列 (0-indexed) → Excel 列 (letter)。位置関係が 1:1 に揃っている。
  column_mapping:
    0: A    # oka
    1: B    # 問合せ日
    3: D    # 塾ID
    4: E    # 塾名
    5: F    # 代理店
    6: G    # 営業担当
    7: H    # 塾担当者名
    8: I    # 資料発送日
    9: J    # 塾長体験日
    10: K   # 会員種別
    11: L   # 追客状況
    12: M   # 体験申込日
    13: N   # お試し申込日
    14: O   # 通年申込日
    15: P   # お試し開始日
    16: Q   # 使用開始日
    17: R   # 解約日
    18: S   # 削除日
    19: T   # 備考
    20: U   # 電話番号
    21: V   # 住所
    22: W   # メール
    23: X   # 差込 $3（DEKITAログインID）
    24: Y   # 差込 $4（DEKITAパスワード）
    25: Z   # 新規メール送信日
    26: AA  # 教室名
    27: AB  # 教室名(2教室目)
    28: AC  # 教室長ＩＤ
    29: AD  # 教室長PW(初期)
    30: AE  # 招待メール送信日
    31: AF  # ﾓﾆﾀｰ終了日
