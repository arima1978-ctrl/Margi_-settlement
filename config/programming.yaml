# プログラミング清算書の設定
service: programming

# 報告書シート名とキーセル
report_sheet: 報告書
month_cell: D1          # 対象月日付
manual_cells:           # 手入力セル（ツールは触らない）
  - AJ3                 # 名大SKY直営分マイクラID数

# 7シートの貼り替え対応表
# source_sheet: .xlsm 側のシート名
# dest_sheet: 清算書側のシート名
sheet_replacements:
  - source_sheet: らくらく　ユーザー基本情報貼り付ける
    dest_sheet: らくらく　ユーザー基本情報貼り付ける
    header_rows: 1
    helper_columns: {}

  - source_sheet: 保護者情報DL貼付⑩AKへ
    dest_sheet: 保護者情報DL貼付⑩AKへ
    header_rows: 1
    helper_columns: {}

  - source_sheet: ④_4カルチャ加盟金
    dest_sheet: ④_4カルチャ加盟金
    header_rows: 2
    data_start_row: 3
    helper_columns: {}

  - source_sheet: ④カルチャー_基本料金
    dest_sheet: ④カルチャー_基本料金
    header_rows: 2
    data_start_row: 3
    helper_columns:
      L: "=C{row}"      # 家族ID（formula）
      M: "=H{row}"      # 料金（formula）
    aggregates:         # 重複する家族IDを統合して O/P に書き出す
      - dst_col_id: O
        dst_col_sum: P
        src_col_id: C
        src_col_sum: H

  - source_sheet: ④プロ_管理者ＩＤ
    dest_sheet: ④_2プロ_管理者ＩＤ
    header_rows: 2
    data_start_row: 3
    helper_columns:
      L: "=C{row}"
      M: "=H{row}"
    aggregates:
      - dst_col_id: O
        dst_col_sum: P
        src_col_id: C
        src_col_sum: H

  - source_sheet: ④プロ_生徒ＩＤ
    dest_sheet: ④_3プロ_生徒ＩＤ
    header_rows: 2
    data_start_row: 3
    helper_columns:
      L: "=C{row}"
      M: "=H{row}"
    aggregates:
      - dst_col_id: O
        dst_col_sum: P
        src_col_id: C
        src_col_sum: H

  - source_sheet: ④ゲームクリエイター生徒ID
    dest_sheet: ④ゲームクリエイター生徒ID
    header_rows: 2
    data_start_row: 3
    helper_columns:
      L: "=C{row}"
      M: "=H{row}"
      # 項目テキスト (F列) から通常/休会の人数・料金を抽出する既存フォーマットを再現
      Q: '=VALUE(MID(F{row},SEARCH("通常生徒：",F{row})+5,SEARCH("円×",F{row})-SEARCH("通常生徒：",F{row})-5))'
      R: '=VALUE(MID(F{row},SEARCH("円×",F{row})+2,SEARCH("名分",F{row})-SEARCH("円×",F{row})-2))'
      S: "=Q{row}*R{row}"
      T: '=VALUE(MID(F{row},SEARCH("休会生徒：",F{row})+5,SEARCH("円×",F{row},SEARCH("休会生徒：",F{row}))-SEARCH("休会生徒：",F{row})-5))'
      U: '=VALUE(MID(F{row},SEARCH("円×",F{row},SEARCH("休会生徒：",F{row}))+2,SEARCH("名分",F{row},SEARCH("円×",F{row},SEARCH("休会生徒：",F{row})))-SEARCH("円×",F{row},SEARCH("休会生徒：",F{row}))-2))'
      V: "=T{row}*U{row}"
      W: "=SUM(S{row},V{row})"
      X: "=H{row}-W{row}"
    aggregates:
      - dst_col_id: O
        dst_col_sum: P
        src_col_id: C
        src_col_sum: H

# 新規塾自動追加の設定
new_shop_detection:
  enabled: true

  # true にすると 報告書 B列と プログラミング営業管理 に自動追加
  # false にすると候補リストの表示のみ（MVP）
  auto_append_to_report: false

  # プログラミング実績のある家族IDを集計するソース側のカテゴリシート
  source_category_sheets:
    - ④_4カルチャ加盟金
    - ④カルチャー_基本料金
    - ④プロ_管理者ＩＤ
    - ④プロ_生徒ＩＤ
    - ④ゲームクリエイター生徒ID

  # 報告書側の家族ID列（新規検出の比較対象）
  report_family_id_column: B
  report_data_start_row: 11

  # プログラミング営業管理シートにも追加
  sales_management_sheet: プログラミング営業管理
  sales_management_id_column: C

  # 新規塾を取得するGoogleスプレッドシート
  google_sheet_id: 1fT5niRMqfvdIMm0GuW0l1_fetHS8eoEfdU84BJLOk6k
  google_sheet_tab: プログラミング営業管理   # タブ名（後で実機確認して調整）

# プログラミング営業管理 シートを Google Sheet (CSV) から全行置換
sales_master_sync:
  enabled: true
  sheet: プログラミング営業管理

  # 「ウェブに公開」した CSV URL、または --sales-master でローカルパスを渡す
  csv_url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSS-ZiFGcVwN7Y6bvaXfcZLwZnxmcm_eYyuQ5pK41DoU-iQckWBPUBPosJT96a0g5Ngd145cAEA8TaK/pub?gid=0&single=true&output=csv"

  csv_data_start_row: 2        # CSV の塾データは3行目から（0-indexed だと 2）
  excel_data_start_row: 3      # Excel の塾データは3行目から（1-indexed）
  excel_max_col_letter: AG     # 既存ヘッダーの右端

  # CSV 列 (0-indexed) → Excel 列 (letter)
  column_mapping:
    0: A      # No
    2: C      # 塾ID
    3: D      # 塾名
    4: E      # 代理店
    5: F      # 営業担当
    6: G      # 塾担当者名
    7: I      # 塾長体験日
    9: J      # 生徒体験会実施日
    10: K     # 追客状況
    17: M     # 初期費用請求
    19: N     # 使用開始日
    21: P     # 備考
    33: R     # 電話番号
    34: S     # 住所
    35: T     # メール
    36: U     # 属性
    37: V     # 教室長ＩＤ
    38: W     # 教室長PW(初期)
    39: X     # ID_PDF_送信日
    40: Y     # 塾名 (dup)
    41: Z     # 塾ID (dup)
    43: AA    # アンプロ教室長ID
    44: AB    # アンプロ塾長初期PW
    45: AC    # アンプロ塾長動画視聴ID
    46: AD    # アンプロ塾長動画視聴PW
    47: AE    # サイトＩＤ
    48: AF    # サイトPW
    49: AG    # ID・PWチェック

# プログラミング営業管理 で「追客状況=契約」の塾を報告書に自動追加。
# sales_master_sync の直後に走り、Google Sheet 側で新しく契約となった塾が
# 次回実行時に 報告書 B列へ反映される。
contract_shop_sync:
  enabled: true
  sheet: プログラミング営業管理
  id_column: C           # 塾ID
  status_column: K       # 追客状況
  status_value: 契約
  data_start_row: 3      # r1/r2 はヘッダー、データは r3 から
  append_to_report: true
